<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>P07 · 误区一</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  h1 { margin-bottom: 48px; }
</style>
</head>
<body class="">
  <div class="masthead-strip"></div>
  
  <div class="kicker"><div class="kicker-line"></div><div class="kicker-text">Myth 01</div></div>
  <h1 style="margin-bottom:60px;">误区一：AI只能<span class="accent">聊天</span></h1>
  <div class="two-col" style="max-width:1400px;">
    <div>
      <div style="font-size:28px;font-weight:700;color:var(--text);margin-bottom:24px;">❌ 错误认知</div>
      <div class="body-text">AI就是一个高级聊天机器人，只能回答问题和生成文字。想让它做复杂任务？不行。</div>
    </div>
    <div style="border-left:2px solid var(--border);padding-left:60px;">
      <div style="font-size:28px;font-weight:700;color:var(--accent);margin-bottom:24px;">✓ 实际情况</div>
      <div class="body-text">现代AI Agent可以调用工具、访问网络、执行代码、操作文件、定时运行任务。聊天只是交互界面，不是能力边界。</div>
    </div>
  </div>
  <div style="margin-top:80px;padding:32px;background:var(--accent-light);border-radius:12px;max-width:1200px;">
    <div style="font-size:18px;color:var(--text-secondary);line-height:1.8;">
      <strong style="color:var(--text);">关键洞察：</strong>把AI当成"能对话的助手"是思维局限。它实际上是"能执行任务的Agent"——你描述目标，它自主完成。
    </div>
  </div>

  <div class="page-footer">
    <span class="footer-left">AI工具，不止聊天</span>
    <span>07 / 30</span>
  </div>
</body>
</html>
