<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>P27 · 推荐桌面端</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  h1 { margin-bottom: 48px; }
</style>
</head>
<body class="">
  <div class="masthead-strip"></div>
  
  <div class="kicker"><div class="kicker-line"></div><div class="kicker-text">Why Desktop</div></div>
  <h1 style="margin-bottom:60px;">为什么推荐<span class="accent">桌面端</span>？</h1>
  <div class="content-grid" style="max-width:1400px;">
    <div class="item">
      <div class="item-num">01</div>
      <div class="item-title">本地优先</div>
      <div class="item-desc">数据留在本地，敏感信息不上云。适合处理内部产品数据和商业机密。</div>
    </div>
    <div class="item">
      <div class="item-num">02</div>
      <div class="item-title">随时唤醒</div>
      <div class="item-desc">常驻系统托盘，快捷键一键唤醒。不需要打开浏览器或切换应用。</div>
    </div>
    <div class="item">
      <div class="item-num">03</div>
      <div class="item-title">文件系统</div>
      <div class="item-desc">直接操作本地文件——读取PRD、生成原型、修改文档，无缝衔接工作流。</div>
    </div>
    <div class="item" style="border-top:none;"></div>
    <div class="item">
      <div class="item-num">04</div>
      <div class="item-title">定时任务</div>
      <div class="item-desc">后台持续运行，定时任务不依赖云端服务。电脑开着，Agent就在工作。</div>
    </div>
    <div class="item" style="border-top:none;"></div>
  </div>

  <div class="page-footer">
    <span class="footer-left">AI工具，不止聊天</span>
    <span>27 / 30</span>
  </div>
