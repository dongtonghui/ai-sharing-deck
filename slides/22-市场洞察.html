<head>

<title>P22 · 市场洞察</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">

  h1 { margin-bottom: 48px; }

<body class="">
  <div class="masthead-strip"></div>
  
  <div class="kicker"><div class="kicker-line"></div><div class="kicker-text">Case 02</div></div>
  <h1 style="margin-bottom:40px;">市场机会<span class="accent">洞察</span></h1>
  <div class="two-col" style="max-width:1400px;">
    <div>
      <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:20px;">背景</div>
      <div class="body-text" style="margin-bottom:40px;">我们想进入智能种植机市场，但不确定竞争格局和机会窗口。需要快速了解市场现状。</div>
      <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:20px;">传统做法</div>
      <div class="body-text">购买行业报告 → 手动整理竞品信息 → 专家访谈 → SWOT分析。耗时2-4周，成本高。</div>
    </div>
    <div style="border-left:2px solid var(--border);padding-left:60px;">
      <div style="font-size:22px;font-weight:700;color:var(--accent);margin-bottom:20px;">AI方案</div>
      <div class="body-text" style="margin-bottom:24px;">调用「市场洞察」Skill，AI自动：</div>
      <ul class="styled-list">
        <li><span class="bullet"></span>抓取主流电商平台数据</li>
        <li><span class="bullet"></span>分析竞品功能与定价</li>
        <li><span class="bullet"></span>识别市场空白与机会点</li>
        <li><span class="bullet"></span>生成市场进入策略建议</li>
      </ul>
      <div style="margin-top:24px;font-size:18px;color:var(--accent);font-weight:700;">⏱ 耗时：4小时</div>
    </div>
  </div>

  <div class="page-footer">
    <span class="footer-left">AI工具，不止聊天</span>
    <span>22 / 30</span>
  </div>
