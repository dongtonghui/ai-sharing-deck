<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI工具不止聊天 · 30页分享</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, "PingFang SC", sans-serif; }
  
  /* Overview */
  #overview { position: fixed; inset: 0; background: #f4f1e9; overflow-y: auto; }
  #overview.hidden { display: none; }
  .ov-header { text-align: center; padding: 30px 20px 20px; }
  .ov-header h1 { font-size: 18px; color: #5a5346; letter-spacing: 0.15em; text-transform: uppercase; }
  .ov-header p { font-size: 14px; color: #999; margin-top: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; padding: 20px 40px 40px; max-width: 1600px; margin: 0 auto; }
  .grid-item { position: relative; aspect-ratio: 16/9; background: #fff; border-radius: 8px; overflow: hidden; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; }
  .grid-item:hover { transform: scale(1.03); box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .grid-item iframe { width: 100%; height: 100%; border: 0; display: block; pointer-events: none; }
  .grid-item .num { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,0.7); color: #fff; font-size: 12px; padding: 3px 8px; border-radius: 4px; }
  
  /* Present */
  #present { position: fixed; inset: 0; background: #1a1a1a; display: none; }
  #present.active { display: block; }
  #stage { position: absolute; top: 50%; left: 50%; transform-origin: center center; }
  #stage iframe { width: 1920px; height: 1080px; border: 0; display: block; background: #fff; }
  .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
  .btn { background: rgba(0,0,0,0.6); color: #fff; border: 0; padding: 10px 18px; border-radius: 6px; font-size: 14px; cursor: pointer; }
  .btn:hover { background: rgba(0,0,0,0.8); }
  .counter { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.6); color: #fff; padding: 10px 18px; border-radius: 6px; font-size: 14px; z-index: 100; }
  .nav-zone { position: fixed; top: 0; bottom: 0; width: 20%; cursor: pointer; z-index: 50; }
  .nav-zone.left { left: 0; }
  .nav-zone.right { right: 0; }
  .nav-hint { position: absolute; top: 50%; transform: translateY(-50%); font-size: 40px; color: rgba(255,255,255,0.3); opacity: 0; transition: opacity 0.2s; }
  .nav-zone:hover .nav-hint { opacity: 1; }
  .nav-zone.left .nav-hint { left: 20px; }
  .nav-zone.right .nav-hint { right: 20px; }
</style>
</head>
<body>

<div id="overview">
  <div class="ov-header">
    <h1>AI工具，不止聊天</h1>
    <p>点击任意页面进入演示模式 · 键盘 ← → 翻页 · ESC 返回</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div id="present">
  <div id="stage"><iframe id="frame" src="about:blank"></iframe></div>
  <div class="counter" id="counter">1 / 30</div>
  <div class="controls">
    <button class="btn" id="ovBtn">⊞ 概览</button>
  </div>
  <div class="nav-zone left" id="navL"><div class="nav-hint">‹</div></div>
  <div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
</div>

<script>
const DECK = [
  { file: "slides/01-封面.html", label: "封面" },
  { file: "slides/02-目录.html", label: "目录" },
  { file: "slides/03-自我介绍.html", label: "自我介绍" },
  { file: "slides/04-痛点.html", label: "痛点" },
  { file: "slides/05-工作流.html", label: "工作流" },
  { file: "slides/06-误区.html", label: "误区" },
  { file: "slides/07-误区一.html", label: "误区一" },
  { file: "slides/08-误区二.html", label: "误区二" },
  { file: "slides/09-误区三.html", label: "误区三" },
  { file: "slides/10-进阶用法.html", label: "进阶用法" },
  { file: "slides/11-Skills生态.html", label: "Skills生态" },
  { file: "slides/12-市场分析.html", label: "市场分析" },
  { file: "slides/13-用户调研.html", label: "用户调研" },
  { file: "slides/14-PRD撰写.html", label: "PRD撰写" },
  { file: "slides/15-原型制作.html", label: "原型制作" },
  { file: "slides/16-定时任务.html", label: "定时任务" },
  { file: "slides/17-周期性报告.html", label: "周期性报告" },
  { file: "slides/18-数据监控.html", label: "数据监控" },
  { file: "slides/19-实战案例.html", label: "实战案例" },
  { file: "slides/20-Reddit抓取.html", label: "Reddit抓取" },
  { file: "slides/21-分析结果.html", label: "分析结果" },
  { file: "slides/22-市场洞察.html", label: "市场洞察" },
  { file: "slides/23-洞察结论.html", label: "洞察结论" },
  { file: "slides/24-工具推荐.html", label: "工具推荐" },
  { file: "slides/25-Hermes介绍.html", label: "Hermes介绍" },
  { file: "slides/26-Hermes对比.html", label: "Hermes对比" },
  { file: "slides/27-推荐桌面端.html", label: "推荐桌面端" },
  { file: "slides/28-快速上手.html", label: "快速上手" },
  { file: "slides/29-总结.html", label: "总结" },
  { file: "slides/30-封底.html", label: "封底" }
];

const W = 1920, H = 1080;
let current = 0;

const overview = document.getElementById('overview');
const present = document.getElementById('present');
const grid = document.getElementById('grid');
const stage = document.getElementById('stage');
const frame = document.getElementById('frame');
const counter = document.getElementById('counter');

function fit() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.95;
  stage.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
}

function show(idx) {
  if (idx < 0 || idx >= DECK.length) return;
  current = idx;
  frame.src = DECK[idx].file;
  counter.textContent = (idx + 1) + ' / ' + DECK.length + ' · ' + DECK[idx].label;
}

function next() { show(Math.min(current + 1, DECK.length - 1)); }
function prev() { show(Math.max(current - 1, 0)); }

function setMode(mode) {
  if (mode === 'present') {
    overview.classList.add('hidden');
    present.classList.add('active');
    fit();
    show(current);
  } else {
    overview.classList.remove('hidden');
    present.classList.remove('active');
  }
}

// Build grid
DECK.forEach((item, idx) => {
  const div = document.createElement('div');
  div.className = 'grid-item';
  const ifr = document.createElement('iframe');
  ifr.src = item.file;
  ifr.setAttribute('scrolling', 'no');
  div.appendChild(ifr);
  const num = document.createElement('div');
  num.className = 'num';
  num.textContent = (idx + 1) + ' · ' + item.label;
  div.appendChild(num);
  div.addEventListener('click', () => { current = idx; setMode('present'); });
  grid.appendChild(div);
});

// Events
document.getElementById('ovBtn').addEventListener('click', () => setMode('overview'));
document.getElementById('navL').addEventListener('click', prev);
document.getElementById('navR').addEventListener('click', next);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { setMode('overview'); return; }
  if (!present.classList.contains('active')) return;
  switch (e.key) {
    case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
    case 'ArrowLeft': case 'PageUp': e.preventDefault(); prev(); break;
    case 'Home': e.preventDefault(); show(0); break;
    case 'End': e.preventDefault(); show(DECK.length - 1); break;
  }
});

window.addEventListener('resize', fit);

// Hash navigation
const hashMatch = location.hash.match(/^#(\d+)$/);
if (hashMatch) {
  current = Math.min(parseInt(hashMatch[1], 10) - 1, DECK.length - 1);
  setMode('present');
}
</script>
</body>
</html>
