<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Content · Pentagram</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1920px; height: 1080px;
    background: #FAF9F6;
    font-family: 'Inter', sans-serif;
    overflow: hidden; position: relative;
    padding: 120px 160px;
  }
  /* Masthead strip */
  .masthead {
    position: absolute; top: 0; left: 0; right: 0;
    height: 8px; background: #1a1a1a;
  }
  /* Kicker */
  .kicker {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 40px;
  }
  .kicker-line { width: 32px; height: 2px; background: #C4A35A; }
  .kicker-text {
    font-size: 13px; font-weight: 600; color: #C4A35A;
    text-transform: uppercase; letter-spacing: 0.15em;
  }
  /* H1 */
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 72px; font-weight: 900;
    color: #1a1a1a; line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 80px;
  }
  h1 .accent { color: #C4A35A; }
  /* Content grid */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 40px;
  }
  .item {
    border-top: 2px solid #1a1a1a;
    padding-top: 32px;
  }
  .item-num {
    font-family: 'Playfair Display', serif;
    font-size: 48px; font-weight: 900;
    color: #C4A35A; margin-bottom: 20px;
    line-height: 1;
  }
  .item-title {
    font-size: 24px; font-weight: 700;
    color: #1a1a1a; margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .item-desc {
    font-size: 17px; color: #666;
    line-height: 1.8; font-weight: 400;
  }
  /* Footer */
  .footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 80px;
    border-top: 1px solid #E5E0D5;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 160px;
    font-size: 14px; color: #999;
  }
  .footer-left { font-weight: 500; color: #1a1a1a; }
</style>
</head>
<body>
  <div class="masthead"></div>
  <div class="kicker">
    <div class="kicker-line"></div>
    <div class="kicker-text">进阶用法</div>
  </div>
  <h1>AI的进阶用法：<span class="accent">Skills</span> 生态</h1>
  <div class="content-grid">
    <div class="item">
      <div class="item-num">01</div>
      <div class="item-title">不只是聊天</div>
      <div class="item-desc">AI可以调用专业工具包（Skills），完成市场分析、用户调研、PRD撰写等特定任务，而非简单问答。</div>
    </div>
    <div class="item">
      <div class="item-num">02</div>
      <div class="item-title">可复用的工作流</div>
      <div class="item-desc">Skills将重复性任务封装成标准化流程，一次配置、多次调用，持续提升团队效率。</div>
    </div>
    <div class="item">
      <div class="item-num">03</div>
      <div class="item-title">自进化能力</div>
      <div class="item-desc">Hermes Agent能根据使用经验自动优化Skills，越用越精准，形成团队知识沉淀。</div>
    </div>
  </div>
  <div class="footer">
    <span class="footer-left">AI工具，不止聊天</span>
    <span>06 / 30</span>
  </div>
</body>
</html>
